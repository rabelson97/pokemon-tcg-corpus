name: Build Embeddings DB
run-name: Build Embeddings DB

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional override such as v2.0. Leave blank to auto-bump the next embeddings-vX.Y release."
        required: false
        type: string
  schedule:
    - cron: "23 10 1 * *"

concurrency:
  group: build-embeddings-db
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-embeddings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Restore embeddings image cache
        id: embeddings-image-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/card-images
          key: embeddings-card-images-${{ runner.os }}-${{ hashFiles('scripts/tcgdex_api.py', 'scripts/build_embeddings_db.py', 'models/card_embedder.manifest.json') }}-en-ja
          restore-keys: |
            embeddings-card-images-${{ runner.os }}-en-ja-
            embeddings-card-images-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate promoted embedder
        run: |
          python training/validate_production_embedder.py \
            --model models/card_embedder.onnx \
            --manifest models/card_embedder.manifest.json

      - name: Resolve release version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version_input="${{ inputs.release_version }}"
          if [ -n "$version_input" ]; then
            resolved_version="embeddings-$version_input"
          else
            latest_tag="$(
              gh release list --repo "${{ github.repository }}" --limit 100 --json tagName --jq '.[].tagName' |
              awk '/^embeddings-v[0-9]+\.[0-9]+$/ { print }' |
              sed 's/^embeddings-//' |
              sort -V |
              tail -n 1
            )"
            if [ -z "$latest_tag" ]; then
              next_version="v1.0"
            else
              major="${latest_tag#v}"
              major="${major%%.*}"
              minor="${latest_tag##*.}"
              next_version="v${major}.$((minor + 1))"
            fi
            resolved_version="embeddings-$next_version"
          fi
          echo "EMBEDDINGS_VERSION=$resolved_version" >> "$GITHUB_ENV"
          echo "Resolved embeddings release: $resolved_version"

      - name: Build embeddings database
        run: |
          cmd=(
            python scripts/build_embeddings_db.py
            --output-db embeddings.db
            --model-path models/card_embedder.onnx
            --image-cache-dir "$RUNNER_TEMP/card-images"
            --summary-json embeddings-build-summary.json
            --locales en
            --min-row-count 10000
          )
          "${cmd[@]}"

      - name: Validate embeddings database
        run: |
          variant_k=4
          test "$(sqlite3 embeddings.db 'PRAGMA integrity_check;')" = "ok"
          test "$(sqlite3 embeddings.db 'PRAGMA user_version;')" = "6"
          cards_count="$(sqlite3 embeddings.db 'SELECT COUNT(*) FROM cards;')"
          embeddings_count="$(sqlite3 embeddings.db 'SELECT COUNT(*) FROM embeddings;')"
          test "$(sqlite3 embeddings.db "SELECT COUNT(*) FROM pragma_table_info('cards') WHERE name = 'image_url_low';")" = "1"
          test "$(sqlite3 embeddings.db "SELECT COUNT(*) FROM pragma_table_info('embeddings') WHERE name = 'variant_idx';")" = "1"
          test "$(sqlite3 embeddings.db "SELECT COUNT(*) FROM pragma_table_info('embeddings') WHERE name = 'variant_tag';")" = "1"
          test "$cards_count" -ge 10000
          test "$embeddings_count" = "$((cards_count * variant_k))"
          test "$(sqlite3 embeddings.db 'SELECT COUNT(*) FROM card_equivalents;')" = "$cards_count"
          test "$(sqlite3 embeddings.db 'SELECT COUNT(DISTINCT dim) FROM embeddings;')" = "1"
          test "$(sqlite3 embeddings.db 'SELECT MIN(dim) FROM embeddings;')" = "256"
          test "$(sqlite3 embeddings.db 'SELECT MAX(dim) FROM embeddings;')" = "256"
          test "$(sqlite3 embeddings.db 'SELECT COUNT(DISTINCT variant_tag) FROM embeddings;')" = "$variant_k"
          test "$(sqlite3 embeddings.db 'SELECT COUNT(*) FROM embeddings WHERE length(vector_blob) != 1024;')" = "0"
          # int8 sidecar table
          test "$(sqlite3 embeddings.db "SELECT COUNT(*) FROM pragma_table_info('embeddings_int8') WHERE name = 'vector_int8';")" = "1"
          int8_count="$(sqlite3 embeddings.db 'SELECT COUNT(*) FROM embeddings_int8;')"
          test "$int8_count" -ge 10000
          test "$(sqlite3 embeddings.db 'SELECT MIN(dim) FROM embeddings_int8;')" = "256"
          test "$(sqlite3 embeddings.db 'SELECT MAX(dim) FROM embeddings_int8;')" = "256"
          test "$(sqlite3 embeddings.db 'SELECT COUNT(*) FROM embeddings_int8 WHERE length(vector_int8) != 256;')" = "0"
          echo "int8_count=$int8_count"
          # every card must carry exactly K variants
          test "$(sqlite3 embeddings.db 'SELECT MIN(c) FROM (SELECT COUNT(*) AS c FROM embeddings GROUP BY card_id);')" = "$variant_k"
          test "$(sqlite3 embeddings.db 'SELECT MAX(c) FROM (SELECT COUNT(*) AS c FROM embeddings GROUP BY card_id);')" = "$variant_k"
          sqlite3 embeddings.db "SELECT model_name, dim, COUNT(*) FROM embeddings GROUP BY model_name, dim;"
          test "$(sqlite3 embeddings.db 'SELECT COUNT(*) FROM (SELECT model_name, dim FROM embeddings GROUP BY model_name, dim);')" = "1"
          echo "cards_count=$cards_count"
          echo "embeddings_count=$embeddings_count"
          echo "variants_per_card=$variant_k"

      - name: Save embeddings image cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/card-images
          key: embeddings-card-images-${{ runner.os }}-${{ hashFiles('scripts/tcgdex_api.py', 'scripts/build_embeddings_db.py', 'models/card_embedder.manifest.json') }}-en-ja-${{ github.run_id }}

      - name: Upload build summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: embeddings-build-summary
          path: embeddings-build-summary.json

      - name: Resolve publish mode
        run: |
          python - <<'PY'
          import json
          import os

          with open("embeddings-build-summary.json", encoding="utf-8") as handle:
              summary = json.load(handle)

          inserted = int(summary.get("inserted_embeddings", 0))
          publish_release = inserted > 0

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"INSERTED_EMBEDDINGS={inserted}\n")
              env_file.write(f"PUBLISH_RELEASE={'true' if publish_release else 'false'}\n")

          print(
              f"inserted_embeddings={inserted} "
              f"publish_release={str(publish_release).lower()}"
          )
          PY

      - name: Zip embeddings database
        if: env.PUBLISH_RELEASE == 'true'
        run: zip -j embeddings.db.zip embeddings.db

      - name: Create versioned embeddings release
        if: env.PUBLISH_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$EMBEDDINGS_VERSION" >/dev/null 2>&1 && {
            echo "Release already exists: $EMBEDDINGS_VERSION"
            exit 1
          }
          gh release create "$EMBEDDINGS_VERSION" embeddings.db.zip \
            --title "$EMBEDDINGS_VERSION" \
            --notes "Versioned CardHawk embeddings database release."

      - name: Ensure embeddings alias release exists
        if: env.PUBLISH_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view embeddings-latest >/dev/null 2>&1 || \
            gh release create embeddings-latest \
              --title "embeddings-latest" \
              --notes "Rolling alias release for the latest CardHawk embeddings database."

      - name: Upload embeddings alias asset
        if: env.PUBLISH_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload embeddings-latest embeddings.db.zip --clobber

      - name: Prune old versioned embeddings releases
        if: env.PUBLISH_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/prune_embeddings_releases.py --keep 3
